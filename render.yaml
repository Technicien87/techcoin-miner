services:
  - type: web
    name: techcoin-ecosystem
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
            - key: SECRET_KEY
        generateValue: true
            - key: DATABASE_URL
        fromDatabase:
          name: techcoin-db
          property: connectionString

databases:
    - name: techcoin-db
    plan: free
